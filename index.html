<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface-2: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.15);
      --accent: #b8ff57;
      --accent-dim: rgba(184,255,87,0.12);
      --accent-text: #0d0d0f;
      --text-primary: #f0f0ee;
      --text-secondary: #888887;
      --text-muted: #444443;
      --danger: #ff5f57;
      --danger-dim: rgba(255,95,87,0.12);
      --warning: #ffbd2e;
      --warning-dim: rgba(255,189,46,0.12);
      --mono: 'Syne Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 16px;
      --radius-sm: 8px;
      --radius-pill: 999px;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 4rem;
    }

    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    .logo span { color: var(--accent); }
    .badge { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: var(--radius-pill); border: 1px solid var(--border-strong); color: var(--text-secondary); }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem 2rem;
      margin-bottom: 1rem;
    }

    .clock-area { text-align: center; margin-bottom: 2rem; }
    .ring-wrap { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 1.25rem; }
    .ring-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; opacity: 0.2; pointer-events: none; transition: opacity 0.4s; }
    .ring-svg.active { opacity: 1; }
    .ring-track { fill: none; stroke: var(--border-strong); stroke-width: 2; }
    .ring-prog  { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 502; stroke-dashoffset: 502; transform-origin: center; transform: rotate(-90deg); transition: stroke-dashoffset 0.1s linear; }

    #time-main { font-family: var(--mono); font-size: clamp(48px, 12vw, 72px); letter-spacing: -1px; color: var(--text-primary); line-height: 1; position: relative; z-index: 1; }
    #time-ms   { font-family: var(--mono); font-size: clamp(22px, 5vw, 32px); color: var(--accent); }

    .status-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.75rem; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
    .dot.running { background: var(--accent); animation: pulse 1s ease infinite; }
    .dot.paused  { background: var(--warning); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-text { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); transition: color 0.3s; }
    .status-text.running { color: var(--accent); }
    .status-text.paused  { color: var(--warning); }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .btn { padding: 14px 0; font-family: var(--sans); font-size: 14px; font-weight: 600; letter-spacing: 0.04em; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn:hover:not(:disabled) { background: rgba(255,255,255,0.06); }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-start { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .btn-start:hover:not(:disabled) { background: #cbff7a; }
    .btn-start.pause-mode { background: var(--warning-dim); color: var(--warning); border-color: var(--warning); }
    .btn-reset { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .stat-chip { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
    .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .stat-val { font-family: var(--mono); font-size: 18px; color: var(--text-primary); }
    .stat-val.green { color: var(--accent); }
    .stat-val.red   { color: var(--danger); }

    .laps-card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .laps-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .laps-title { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); }
    #lap-count-badge { font-size: 11px; padding: 3px 10px; border-radius: var(--radius-pill); background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); font-weight: 600; }
    .laps-list { max-height: 280px; overflow-y: auto; }
    .laps-list::-webkit-scrollbar { width: 4px; }
    .laps-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .lap-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); animation: slideIn 0.2s ease; }
    .lap-row:last-child { border-bottom: none; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .lap-num   { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); min-width: 50px; }
    .lap-delta { font-family: var(--mono); font-size: 12px; color: var(--text-muted); min-width: 80px; text-align: center; }
    .lap-time  { font-family: var(--mono); font-size: 15px; color: var(--text-primary); text-align: right; min-width: 90px; }
    .lap-row.best  .lap-time { color: var(--accent); }
    .lap-row.worst .lap-time { color: var(--danger); }
    .lap-row.best  .lap-num::after { content: ' ↑'; color: var(--accent); }
    .lap-row.worst .lap-num::after { content: ' ↓'; color: var(--danger); }
    .laps-empty { padding: 2.5rem 1rem; text-align: center; font-size: 13px; color: var(--text-muted); }

    footer { margin-top: 3rem; font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; text-align: center; }
    footer span { color: var(--text-secondary); }
  </style>
</head>
<body>

  <header>
    <div class="logo">Stop<span>watch</span></div>
    <div class="badge">Task 02</div>
  </header>

  <div class="card">
    <div class="clock-area">
      <div class="ring-wrap">
        <svg class="ring-svg" id="ring-svg" viewBox="0 0 170 170">
          <circle class="ring-track" cx="85" cy="85" r="80"/>
          <circle class="ring-prog"  cx="85" cy="85" r="80" id="ring-prog"/>
        </svg>
        <div>
          <div id="time-main">00:00<span id="time-ms">.00</span></div>
        </div>
      </div>
      <div class="status-row">
        <div class="dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Ready</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="btn-start" onclick="toggleStart()">Start</button>
      <button class="btn" id="btn-lap" onclick="recordLap()" disabled>Lap</button>
      <button class="btn btn-reset" id="btn-reset" onclick="resetAll()" disabled>Reset</button>
    </div>

    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-label">Best lap</div>
        <div class="stat-val green" id="stat-best">—</div>
      </div>
      <div class="stat-chip">
        <div class="stat-label">Worst lap</div>
        <div class="stat-val red" id="stat-worst">—</div>
      </div>
    </div>
  </div>

  <div class="laps-card">
    <div class="laps-header">
      <span class="laps-title">Lap times</span>
      <span id="lap-count-badge">0 laps</span>
    </div>
    <div class="laps-list" id="laps-list">
      <div class="laps-empty">Start the stopwatch to begin recording laps.</div>
    </div>
  </div>

  <footer>Prodigy Infotech Internship &nbsp;·&nbsp; <span>Task 02</span></footer>

  <script>
    let elapsed = 0, startedAt = 0, running = false, rafId = null;
    let laps = [], lapAnchor = 0;
    const CIRCUM = 2 * Math.PI * 80;

    const elMain    = document.getElementById('time-main');
    const elMs      = document.getElementById('time-ms');
    const elDot     = document.getElementById('status-dot');
    const elStatus  = document.getElementById('status-text');
    const btnStart  = document.getElementById('btn-start');
    const btnLap    = document.getElementById('btn-lap');
    const btnReset  = document.getElementById('btn-reset');
    const lapsList  = document.getElementById('laps-list');
    const lapBadge  = document.getElementById('lap-count-badge');
    const statBest  = document.getElementById('stat-best');
    const statWorst = document.getElementById('stat-worst');
    const ringProg  = document.getElementById('ring-prog');
    const ringSvg   = document.getElementById('ring-svg');

    function pad(n)      { return String(Math.floor(n)).padStart(2, '0'); }
    function fmt(ms)     { return pad(ms / 60000) + ':' + pad((ms / 1000) % 60) + '.' + pad((ms % 1000) / 10); }
    function now()       { return elapsed + (running ? Date.now() - startedAt : 0); }

    function tick() {
      const t = now();
      elMain.childNodes[0].textContent = pad(t / 60000) + ':' + pad((t / 1000) % 60);
      elMs.textContent = '.' + pad((t % 1000) / 10);
      ringProg.style.strokeDashoffset = CIRCUM - ((t / 1000) % 60 / 60) * CIRCUM;
      rafId = requestAnimationFrame(tick);
    }

    function setStatus(cls, text) {
      elDot.className = 'dot ' + cls;
      elStatus.className = 'status-text ' + cls;
      elStatus.textContent = text;
    }

    function toggleStart() {
      if (!running) {
        startedAt = Date.now();
        running = true;
        rafId = requestAnimationFrame(tick);
        btnStart.textContent = 'Pause';
        btnStart.classList.add('pause-mode');
        btnLap.disabled = btnReset.disabled = false;
        ringSvg.classList.add('active');
        setStatus('running', 'Running');
      } else {
        elapsed += Date.now() - startedAt;
        running = false;
        cancelAnimationFrame(rafId);
        btnStart.textContent = 'Resume';
        btnStart.classList.remove('pause-mode');
        setStatus('paused', 'Paused');
      }
    }

    function recordLap() {
      if (!running) return;
      const total = now();
      laps.push(total - lapAnchor);
      lapAnchor = total;
      renderLaps();
    }

    function resetAll() {
      running = false; elapsed = 0; lapAnchor = 0; laps = [];
      cancelAnimationFrame(rafId);
      elMain.childNodes[0].textContent = '00:00';
      elMs.textContent = '.00';
      ringProg.style.strokeDashoffset = CIRCUM;
      ringSvg.classList.remove('active');
      btnStart.textContent = 'Start';
      btnStart.classList.remove('pause-mode');
      btnLap.disabled = btnReset.disabled = true;
      setStatus('', 'Ready');
      statBest.textContent = statWorst.textContent = '—';
      lapBadge.textContent = '0 laps';
      lapsList.innerHTML = '<div class="laps-empty">Start the stopwatch to begin recording laps.</div>';
    }

    function renderLaps() {
      const minT = Math.min(...laps), maxT = Math.max(...laps);
      statBest.textContent  = fmt(minT);
      statWorst.textContent = fmt(maxT);
      lapBadge.textContent  = laps.length + ' lap' + (laps.length !== 1 ? 's' : '');
      let cum = 0;
      const rows = laps.map((t, i) => { cum += t; return { i, t, cum }; });
      lapsList.innerHTML = rows.slice().reverse().map(({ i, t, cum }) => {
        const cls = laps.length > 1 ? (t === minT ? ' best' : t === maxT ? ' worst' : '') : '';
        return `<div class="lap-row${cls}">
          <span class="lap-num">Lap ${i + 1}</span>
          <span class="lap-delta">${fmt(t)}</span>
          <span class="lap-time">${fmt(cum)}</span>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
